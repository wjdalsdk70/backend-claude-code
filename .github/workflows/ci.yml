# Spring Boot CI 파이프라인 템플릿
# TODO: JAVA_VERSION, 프로젝트 이름을 맞게 조정하세요
# TODO: Docker Hub 또는 GHCR 사용 시 secrets 설정 필요

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven        # Gradle 사용 시 'gradle'로 변경

      # ── Maven ──────────────────────────────────────────────────────────────
      - name: Build
        run: ./mvnw compile -q --no-transfer-progress

      - name: Test + Coverage
        run: ./mvnw verify -q --no-transfer-progress

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Check Coverage Threshold
        run: |
          COVERAGE=$(grep -oP 'Total.*?(\d+)%' target/site/jacoco/index.html | tail -1 | grep -oP '\d+' | tail -1 || echo "0")
          echo "Line coverage: ${COVERAGE}%"
          if [ "${COVERAGE}" -lt 80 ]; then
            echo "Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi

      # ── Static Analysis ────────────────────────────────────────────────────
      - name: Checkstyle
        run: ./mvnw checkstyle:check -q --no-transfer-progress
        continue-on-error: true   # 경고로만 처리 — 필요 시 false로 변경

      - name: SpotBugs
        run: ./mvnw spotbugs:check -q --no-transfer-progress
        continue-on-error: true

      # ── Security ───────────────────────────────────────────────────────────
      - name: OWASP Dependency Check
        run: ./mvnw dependency-check:check -q --no-transfer-progress
        continue-on-error: true   # 초기 도입 시 경고만, 안정화 후 false로 변경

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: target/dependency-check-report.html

  # ── Docker Build (main 브랜치만) ─────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: ./mvnw package -DskipTests -q --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TODO: Docker Hub 사용 시 아래 주석 해제 및 secrets 설정
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false   # TODO: Docker Hub 연동 후 true로 변경
          tags: |
            ${{ github.repository }}:latest
            ${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
